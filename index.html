<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{font-family:Arial,"Microsoft JhengHei";background:#f5f6f7;padding:15px;}
.box{max-width:420px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
h2{text-align:center;margin-bottom:15px;}
label{font-size:13px;color:#555;}
input,select{width:100%;padding:10px;margin:6px 0 12px;border:1px solid #ddd;border-radius:8px;}
button{width:100%;padding:12px;background:#111827;color:#fff;border:none;border-radius:8px;margin-top:10px;}
.hidden{display:none;}
.step{display:none;}
.step.active{display:block;}
.small{font-size:12px;color:#999;}
*{
box-sizing:border-box;
}

body{
margin:0;
padding:10px;
}

.box{
width:100%;
max-width:420px;
margin:auto;
}

input,select{
width:100%;
font-size:16px;
}

button{
font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h2>🚗 銀河機場接送服務表單</h2>

<!-- STEP 1 -->
<div class="step active" id="step1">

<label>服務類型 *</label>
<select id="serviceType" required>
<option value="">請選擇</option>
<option>桃園機場接送</option>
<option>松山機場接送</option>
</select>

<label>服務方式 *</label>
<select id="transferType" required onchange="checkFlow()">
<option value="">請選擇</option>
<option value="送機">送機服務</option>
<option value="接機">接機服務</option>
</select>

<label>縣市 *</label>
<select id="city" required>
<option value="">請選擇</option>
<option>台北市</option><option>新北市</option><option>基隆市</option>
<option>桃園市</option><option>新竹市</option><option>新竹縣</option>
<option>苗栗縣</option><option>台中市</option><option>彰化縣</option>
<option>南投縣</option><option>雲林縣</option><option>嘉義市</option>
<option>嘉義縣</option><option>台南市</option><option>高雄市</option>
<option>屏東縣</option><option>宜蘭縣</option><option>花蓮縣</option>
<option>台東縣</option>
</select>

<label>車型 *</label>
<select id="carType" required>
<option value="">請選擇</option>
<option>國產5人座</option>
<option>進口5人座</option>
<option>豪華9人座</option>
</select>

<button onclick="nextStep1()">下一步</button>
</div>

<!-- STEP 2（接機） -->
<div class="step" id="step2">

<label>接機日期 *</label>
<input type="date" id="airportDate">

<label>航班編號 *</label>
<input type="text" id="flightNo">

<label>下車地址 *</label>
<input type="text" id="dropAddress">

<button onclick="nextStep2()">下一步</button>
</div>

<!-- STEP 3（送機） -->
<div class="step" id="step3">

<label>用車日期 *</label>
<input type="date" id="rideDate">

<label>上車地址 *</label>
<input type="text" id="pickupAddress">

<button onclick="nextStep3()">下一步</button>
</div>

<!-- STEP 4 -->
<div class="step" id="step4">

<label>姓名 *</label>
<input type="text" id="name">

<label>用車時間 *</label>

<div style="display:flex; gap:8px;">
  <select id="period">
    <option value="">上午/下午</option>
    <option>上午</option>
    <option>下午</option>
    </select>

  <input type="time" id="time">
</div>

<label>手機 *</label>
<input type="text" id="phone">

<label>備用聯絡（非必填）</label>
<input type="text" id="backup">

<label>人數 *</label>
<input type="number" id="people">

<label>行李 *</label>
<input type="text" id="luggage">

<label>大型物品 *</label>
<input type="text" id="bigItem">

<button onclick="nextStep4()">下一步</button>
</div>

<!-- STEP 5 -->
<div class="step" id="step5">

<label>西裝司機 +100</label>
<select id="suit">
<option>否</option><option>是</option>
</select>

<label>外語司機 +100</label>
<select id="lang">
<option>否</option><option>是</option>
</select>

<label>寵物 +100</label>
<select id="pet">
<option>否</option><option>是</option>
</select>

<label>指定車款 +100</label>
<input type="text" id="specCar">

<label>兒童座椅</label>
<input type="number" id="childSeat">

<label>增高墊</label>
<input type="number" id="booster">

<button onclick="submitForm()">確認送出</button>
</div>

</div>

<script>
let userId="";

async function init(){
await liff.init({liffId:"2010005375-A2USJzj3"});
if(!liff.isLoggedIn()){liff.login();return;}
const p=await liff.getProfile();
userId=p.userId;
document.getElementById("name").value=p.displayName;
}
init();

function checkFlow(){}

function nextStep1(){
const t=document.getElementById("transferType").value;
if(!t||!document.getElementById("serviceType").value||
!document.getElementById("city").value||
!document.getElementById("carType").value){
alert("請填寫所有必填欄位");
return;
}
document.getElementById("step1").classList.remove("active");
if(t==="接機"){
document.getElementById("step2").classList.add("active");
}else{
document.getElementById("step3").classList.add("active");
}
}

function nextStep2(){
const airportDate = document.getElementById("airportDate").value;
const flightNo = document.getElementById("flightNo").value;
const dropAddress = document.getElementById("dropAddress").value;

if(!airportDate || !flightNo || !dropAddress){
alert("請填寫所有必填欄位");
return;
}
goStep4();
}

function nextStep3(){
const rideDate = document.getElementById("rideDate").value;
const pickupAddress = document.getElementById("pickupAddress").value;

if(!rideDate || !pickupAddress){
alert("請填寫所有必填欄位");
return;
}
goStep4();
}

function goStep4(){
hideAll();document.getElementById("step4").classList.add("active");
}

function nextStep4(){

const nameVal = document.getElementById("name").value.trim();
const timeVal = document.getElementById("time").value;
const periodVal = document.getElementById("period").value;
const phoneVal = document.getElementById("phone").value.trim();
const peopleVal = document.getElementById("people").value;
const luggageVal = document.getElementById("luggage").value.trim();
const bigItemVal = document.getElementById("bigItem").value.trim();

if(!nameVal || !timeVal || !periodVal || !phoneVal || !peopleVal || !luggageVal || !bigItemVal){
alert("請填寫所有必填欄位");
return;
}

hideAll();
document.getElementById("step5").classList.add("active");
}

function hideAll(){
document.querySelectorAll(".step").forEach(e=>e.classList.remove("active"));
}

function submitForm(){

const data={
type:"form",
userId:userId,
serviceType:document.getElementById("serviceType").value,
transferType:document.getElementById("transferType").value,
city:document.getElementById("city").value,
carType:document.getElementById("carType").value,
airportDate:document.getElementById("airportDate").value,
flightNo:document.getElementById("flightNo").value,
dropAddress:document.getElementById("dropAddress").value,
rideDate:document.getElementById("rideDate").value,
pickupAddress:document.getElementById("pickupAddress").value,
name:document.getElementById("name").value,
time:document.getElementById("time").value,
phone:document.getElementById("phone").value,
backup:document.getElementById("backup").value,
people:document.getElementById("people").value,
luggage:document.getElementById("luggage").value,
bigItem:document.getElementById("bigItem").value,
suit:document.getElementById("suit").value,
lang:document.getElementById("lang").value,
pet:document.getElementById("pet").value,
specCar:document.getElementById("specCar").value,
childSeat:document.getElementById("childSeat").value,
booster:document.getElementById("booster").value,
period:document.getElementById("period").value
};

fetch("https://script.google.com/macros/s/AKfycbzRMo7RMDB9Enfu-Yzo1RHxq9bDe2Gx3OqdoO6zpZOr5Gn_bW9IFChl7gUHVmnQAOMP/exec",{
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body:JSON.stringify(data)
})
.then(res => res.text())
.then(res => {
  if(res !== "OK"){
    alert("後端錯誤：" + res);
    return;
  }

  alert("已成功送出");
  liff.closeWindow();
})
.catch(err => {
  alert("送出失敗");
  console.log("錯誤:", err);
});
}
</script>

</body>
</html>
